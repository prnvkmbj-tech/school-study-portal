<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Study Portal - Class 11 & 12 CBSE</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>
<body>
  <header>
    <h1>School Study Portal</h1>
    <p>Interactive learning for Class 11 &amp; 12 &bull; CBSE Curriculum</p>
  </header>

  <div class="container">
    <nav class="breadcrumb" id="breadcrumb"></nav>
    <div id="content"></div>
  </div>

  <div class="toast" id="toast"></div>

  <button class="chat-toggle" id="chatToggle" onclick="toggleChat()" title="AI Tutor">
    <span>🤖</span>
  </button>

  <div class="chat-widget" id="chatWidget">
    <div class="chat-header">
      <div class="chat-avatar">🧠</div>
      <div class="chat-title">
        <h4>AI Tutor</h4>
        <p>Your study assistant</p>
      </div>
      <button class="chat-close" onclick="toggleChat()">&times;</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        <div class="bot-name">AI Tutor</div>
        <p>Hi! I'm your AI study assistant. Ask me any doubt about your CBSE subjects — Physics, Chemistry, Maths, Biology, and more!</p>
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="Ask a doubt..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="chat-send" id="chatSend" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
